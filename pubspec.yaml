name: primeyard_workspace
description: PrimeYard Workspace native Flutter app v6
publish_to: 'none'
version: 6.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo-full.png
    - assets/logo-mark.png
    - assets/mascot.png
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  min_sdk_android: 21
